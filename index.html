<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 💔</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: fadeIn 2s ease;
    }

    h1 {
        font-size: 3rem;
        color: #fff;
        margin-bottom: 20px;
    }

    p {
        font-size: 1.2rem;
        color: #fff;
        margin-bottom: 30px;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        background: #ff6b6b;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4757;
        transform: scale(1.1);
    }

    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% { transform: translateY(100vh) scale(1); opacity: 1; }
        100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(50px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .hidden {
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <h1>I'm Really Sorry 😔</h1>
    <p id="message">I messed up... but our friendship means everything to me.</p>
    <button onclick="nextMessage()">Click Me 💌</button>
</div>

<script>
    const messages = [
        "I didn't mean to hurt you...",
        "You're not just my friend, you're my family ❤️",
        "I miss our talks and laughs 😢",
        "Please forgive me...",
        "I promise I'll do better 🙏",
        "You matter to me more than anything 💖"
    ];

    let index = 0;

    function nextMessage() {
        if(index < messages.length) {
            document.getElementById("message").innerText = messages[index];
            index++;
        }
    }

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerText = '❤';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
